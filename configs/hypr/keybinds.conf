# =====================================
# Keybindings
# =====================================

# -------------------------------------
# Application Launchers
# -------------------------------------

# Launch terminal
bind = SUPER, RETURN, exec, $terminal

# Launch application launcher
bind = SUPER, SPACE, exec, rofi -show drun

# Clipboard history
bind = SUPER, V, exec, $HOME/.local/bin/clipboard-menu

# Power menu
bind = SUPER, P, exec, $HOME/.local/bin/power-menu


# -------------------------------------
# Window Management
# -------------------------------------

# Kill active window
bind = SUPER, Q, killactive

# Exit Hyprland
bind = SUPER, M, exit

# Reload configuration
bind = SUPER, R, exec, hyprctl reload


# -------------------------------------
# Screenshots
# -------------------------------------

# Screenshot selected region
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png

# Screenshot entire screen
bind = SUPER, PRINT, exec, grim ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png


# -------------------------------------
# Media Controls
# -------------------------------------

# Play / Pause
bindl = , XF86AudioPlay, exec, playerctl play-pause

# Next Track
bindl = , XF86AudioNext, exec, playerctl next

# Previous Track
bindl = , XF86AudioPrev, exec, playerctl previous

# Stop Playback
bindl = , XF86AudioStop, exec, playerctl stop

# Volume Up
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

# Volume Down
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Toggle Mute
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Toggle Microphone Mute
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle


# -------------------------------------
# Reserved Future Keybinds
# -------------------------------------
#
# SUPER + L  -> Lock screen (hyprlock)
# SUPER + E  -> File manager
# SUPER + B  -> Web browser
# SUPER + N  -> Notification history
# SUPER + W  -> Wallpaper selector
# SUPER + C  -> Calculator
#
