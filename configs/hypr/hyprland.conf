# =====================================
# Hyprland VMware Test Configuration
# =====================================

# -----------------------
# Monitor
# -----------------------

monitor = ,preferred,auto,1


# -----------------------
# Variables
# -----------------------

$terminal = foot


# -----------------------
# Input
# -----------------------

input {
    kb_layout = us
    follow_mouse = 1
}


# -----------------------
# General
# -----------------------

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
}


# -----------------------
# Decoration
# -----------------------

decoration {
    rounding = 8

    blur {
        enabled = true
        size = 6
        passes = 2
    }
}


# -----------------------
# Animations
# -----------------------

animations {
    enabled = false
}


# -----------------------
# Modular Configuration
# -----------------------

source = ~/.config/hypr/environment.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/autostart.conf
