# =====================================
# Hyprland VMware Test Configuration
# =====================================

# VM monitor
monitor=,preferred,auto,1


# Environment
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_RENDERER_ALLOW_SOFTWARE,1


# Input
input {
    kb_layout = us
    follow_mouse = 1
}


# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    layout = dwindle
}


# Decoration
decoration {
    rounding = 8

    blur {
        enabled = true
        size = 6
        passes = 2
    }
}


# Animations
animations {
    enabled = false
}


# Layout
dwindle {
    pseudotile = true
}


# Terminal
$terminal = foot


# Launch terminal
bind = SUPER, RETURN, exec, $terminal


# Kill window
bind = SUPER, Q, killactive


# Exit
bind = SUPER, M, exit


# Reload
bind = SUPER, R, exec, hyprctl reload

# Status bar
exec-once = waybar
