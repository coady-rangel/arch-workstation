# ==============================
# Hyprland Base Configuration
# Arch Workstation
# ==============================


# Monitor
monitor=,preferred,auto,1


# Input
input {
    kb_layout = us
    follow_mouse = 1
}


# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
}


# Decorations
decoration {
    rounding = 10
}


# ==============================
# Startup Applications
# ==============================

# Keep minimal during bring-up
# waybar, wallpaper, agents added later


# ==============================
# Keybinds
# ==============================

# Primary terminal (temporary reliable bind)
bind = CTRL, RETURN, exec, kitty


# Super key bindings
# Will validate after VMware key mapping
bind = SUPER, RETURN, exec, kitty
bind = SUPER, Q, killactive
bind = SUPER, M, exit
